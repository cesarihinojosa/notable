<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notable — visual boards</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="topbar">
    <div id="breadcrumbs"></div>
    <div id="topbar-actions">
      <button id="btn-export" title="Export all boards as JSON">Export</button>
      <button id="btn-import" title="Import boards from JSON">Import</button>
      <input type="file" id="import-file" accept="application/json" hidden>
      <span id="zoom-label">100%</span>
    </div>
  </header>

  <aside id="toolbar">
    <button class="tool" data-add="note" title="Add note (N)">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v12l-4 4H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M16 20v-4h4" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>Note</span>
    </button>
    <button class="tool" data-add="todo" title="Add to-do list (T)">
      <svg viewBox="0 0 24 24"><rect x="4" y="5" width="5" height="5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5 7.5l1.5 1.5L9 6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 7.5h8M4 16h16" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>To-do</span>
    </button>
    <button class="tool" data-add="link" title="Add link (L)">
      <svg viewBox="0 0 24 24"><path d="M10 14a4 4 0 0 1 0-5.6l2.4-2.4a4 4 0 1 1 5.6 5.6L16.6 13" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M14 10a4 4 0 0 1 0 5.6l-2.4 2.4a4 4 0 1 1-5.6-5.6L7.4 11" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>Link</span>
    </button>
    <button class="tool" data-add="image" title="Add image (I) — or just paste / drag one in">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="9" cy="10" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3 17l6-5 4 3 4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>Image</span>
    </button>
    <button class="tool" data-add="board" title="Add nested board (B)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>Board</span>
    </button>
    <button class="tool" data-add="column" title="Add column (C)">
      <svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M9 8h6M9 12h6M9 16h6" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>Column</span>
    </button>
    <div class="tool-sep"></div>
    <button class="tool" id="tool-connect" title="Connect cards with an arrow (A)">
      <svg viewBox="0 0 24 24"><path d="M5 19C9 15 15 9 18 6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M18 11V6h-5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
      <span>Arrow</span>
    </button>
  </aside>

  <main id="viewport">
    <div id="world">
      <svg id="edges"></svg>
      <div id="items"></div>
    </div>
    <div id="marquee" hidden></div>
  </main>

  <div id="hint">Double-click the canvas to add a note · Scroll to pan · ⌘/Ctrl+scroll to zoom · Paste images or links</div>

  <script src="js/store.js"></script>
  <script src="js/board.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
